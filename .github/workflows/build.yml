name: Build Desktop Application

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
    # ── 1. Checkout ────────────────────────────────────────────────────────────
    - name: Checkout code
      uses: actions/checkout@v4

    # ── 2. Python ──────────────────────────────────────────────────────────────
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    # ── 3. Dependencies ────────────────────────────────────────────────────────
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright>=1.44.0 aiofiles>=24.1.0 pydantic>=2.7.0 pydantic-settings>=2.3.0 PyYAML>=6.0.0 python-dotenv>=1.0.0 loguru>=0.7.0 psutil>=5.9.0
        pip install pyinstaller>=6.0.0

    # ── 4. Playwright browsers ─────────────────────────────────────────────────
    # PLAYWRIGHT_BROWSERS_PATH=0 installs browsers INSIDE the playwright Python
    # package folder so PyInstaller's --collect-all playwright will bundle them.
    - name: Install Playwright Chromium browser
      env:
        PLAYWRIGHT_BROWSERS_PATH: '0'
      run: |
        python -m playwright install chromium

    # ── 5. Build .exe ──────────────────────────────────────────────────────────
    # Entry point: launcher.py (sets env vars / CWD before importing app.py)
    # --noconsole   : no black console window on launch (same as --windowed)
    # --onedir      : single folder output so we can add config/ next to the exe
    # --collect-all playwright : bundles the Node driver AND browser binaries
    # --name app    : output exe will be named app.exe
    - name: Build with PyInstaller
      env:
        PLAYWRIGHT_BROWSERS_PATH: '0'
      run: >
        pyinstaller
        --onedir
        --noconsole
        --clean
        --noconfirm
        --name app
        --collect-all playwright
        launcher.py

    # ── 6. Create distribution folder structure ────────────────────────────────
    - name: Assemble dist folder
      shell: pwsh
      run: |
        # config/ directory with config.yaml (credentials.txt is user-supplied,
        # so we create an empty placeholder)
        New-Item -ItemType Directory -Force -Path dist\app\config | Out-Null
        Copy-Item -Path config\config.yaml -Destination dist\app\config\config.yaml

        # Empty credentials placeholder so the app starts without crashing
        New-Item -ItemType File -Force -Path dist\app\config\credentials.txt | Out-Null

        # Runtime output directories
        New-Item -ItemType Directory -Force -Path dist\app\results | Out-Null
        New-Item -ItemType Directory -Force -Path dist\app\logs   | Out-Null
        New-Item -ItemType Directory -Force -Path dist\app\state  | Out-Null

    # ── 7. Smoke-test: verify the exe exists and _internal is populated ─────────
    - name: Verify build output
      shell: pwsh
      run: |
        if (-not (Test-Path "dist\app\app.exe")) {
          Write-Error "app.exe not found in dist\app\"
          exit 1
        }
        Write-Host "Build successful: dist\app\app.exe exists"
        Get-ChildItem dist\app\ | Select-Object Name, Length

    # ── 8. Upload artifact ─────────────────────────────────────────────────────
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: LoginTester-Windows
        path: dist/app/
        retention-days: 14
